name: mad
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0        # The map widget
  latlong2: ^0.9.1           # For handling coordinates
  geolocator: ^11.0.0        # (You should already have this)
  supabase_flutter: ^2.0.2
  flutter_local_notifications: ^16.3.3 # Notifications & Alarms
  timezone: ^0.9.2
  fl_chart: ^0.66.0 # Dashboard Charts
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/myqr.jpeg
